# HOMESERVER: Enable IPv4/IPv6 forwarding so LAN clients can reach internet via this host.
# Required for nftables forward chain and NAT (lan0 -> wan0).
# We also set IPForward=yes in 10-wan0.network and 20-lan0.network; on some systems
# (e.g. Debian 13 / Trixie, or certain kernel or systemd-networkd order) that can fail
# to set the global sysctl at boot. This drop-in guarantees forwarding is on regardless.
net.ipv4.ip_forward = 1
net.ipv6.conf.all.forwarding = 1
